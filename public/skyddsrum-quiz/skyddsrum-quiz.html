<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --white: #ffffff;
    --blue: #000000;
    --blue-mid: #000000;
    --orange: #000000;
    --line: #dddddd;
    --muted: #777777;
    --text: #111111;
    --font: 'Space Mono', monospace;
    --font-helvetica: "Helvetica Neue LT Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --app-cursor: url("nya pikto/coursor.svg") 1 1;
  }

  body {
    background: #ffffff;
    color: var(--text);
    font-family: var(--font-helvetica);
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.5;
    cursor: var(--app-cursor), auto;
  }

  html, body, body * {
    cursor: var(--app-cursor), auto !important;
  }

  .page {
    max-width: 1000px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  /* --- Intro / homepage --- */

  .intro-frame {
    position: fixed;
    inset: 0;
    z-index: 999;
    overflow: hidden;
    background: #ff7800;
    font-family: var(--font-helvetica);
    user-select: none;
    cursor: var(--app-cursor), auto;
  }

  .intro-corner-wrap {
    position: absolute;
    top: -1px;
    right: -1px;
    left: auto;
    display: flex;
    flex-direction: row-reverse;
    align-items: center;
    gap: 10px;
    z-index: 20;
    cursor: var(--app-cursor), pointer;
    pointer-events: auto;
  }

  .intro-corner-icon {
    width: 72px;
    height: 72px;
    transition: transform 0.22s ease;
    transform-origin: center;
  }

  .intro-corner-text {
    font-family: "Helvetica Neue LT Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: #111;
    background: rgba(255,255,255,0.88);
    border: 1px solid #111;
    padding: 3px 9px;
    display: inline-block;
    opacity: 0;
    white-space: nowrap;
    transform: translateX(10px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
  }

  .intro-corner-wrap:hover .intro-corner-icon {
    transform: scale(1.1);
  }

  .intro-corner-wrap:hover .intro-corner-text {
    opacity: 1;
    transform: translateX(0);
  }

  .intro-title-box {
    position: absolute;
    top: 8%;
    left: 39%;
    right: 2%;
    transform: translateX(0.7vw);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 210px;
    background: #ffffff;
    border: 7px solid #111;
    padding: 0 28px;
    text-align: center;
    z-index: 2;
  }

  .intro-title-box h1 {
    font-family: "Helvetica Neue LT Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 5.2vw;
    line-height: 1.15;
    font-weight: 500;
    color: #000;
    max-width: 95%;
    margin: 0 auto;
    text-align: left;
    transform: translateY(10px);
  }

  .intro-silhouette {
    position: absolute;
    will-change: transform;
    left: -28%;
    bottom: -65%;
    width: 110%;
    height: auto;
    z-index: 3;
    animation: intro-slide-silhouette 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
    pointer-events: none;
  }

  .intro-arrow {
    position: absolute;
    will-change: transform;
    left: 60%;
    bottom: -40%;
    width: 60%;
    height: auto;
    cursor: pointer;
    z-index: 4;
    animation: intro-slide-arrow 1s cubic-bezier(0.22,1,0.36,1) 0.2s both;
  }

  .intro-arrow:hover {
    opacity: 0.75;
  }

  @keyframes intro-slide-silhouette {
    from { transform: translateX(-60px); opacity: 0.6; }
    to   { transform: translateX(0);     opacity: 1; }
  }

  @keyframes intro-slide-arrow {
    from { transform: translateX(-80px); opacity: 0; }
    to   { transform: translateX(0);     opacity: 1; }
  }

  /* ============================================================
     QUIZ QUESTION PAGE — full viewport layout
     All elements labelled so you can tweak each independently
     ============================================================ */

  /* The full-screen white container for every quiz question */
  .q-page {
    position: fixed;
    inset: 0;
    z-index: 998;
    background: #fff;
    display: flex;
    flex-direction: column;
    font-family: "Helvetica Neue LT Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow: hidden;
    cursor: default;         /* prevent I-beam cursor on non-interactive elements */
    user-select: none;       /* prevent accidental text selection */
  }

  /* ── TOP BAR ─────────────────────────────────────────────── */

  /* Outer row that holds the question number and next-arrow */
  .q-topbar {
    position: relative;
    height: 8vh;        /* ← height of the top bar / number box */
    flex-shrink: 0;
    margin: 4vh 0 0;    /* ← gap from top — increase to move number/arrow/T-cap down */
  }

  /* Question number box — e.g. "1/5" — black square top-left */
  .q-counter-box {
    position: absolute;
    left: 5.4vw;        /* ← distance from left edge of viewport */
    top: 0; bottom: 0;
    width: 8vh;         /* ← width of the number box (matches height) */
    background: #111;
    color: #fff;
    font-family: "Helvetica Neue LT Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 500;
    font-size: 28px;    /* ← NUMBER BOX SIZE — change this single value to make "1/5" bigger/smaller */
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Next-question arrow button — placed left of the top T-cap */
  .q-next-box {
    position: absolute;
    --arrow-size: 23vh;            /* ← change ONLY this to resize — position stays fixed */
    left: calc(45% - var(--arrow-size) + 4vw); /* nudge right for visual alignment */
    top: 50%;
    transform: translateY(-50%);  /* keeps vertical center locked no matter the size */
    width: var(--arrow-size);
    height: var(--arrow-size);
    background: transparent;
    border: none;
    padding: 0;
    cursor: pointer;
  }

  /* Both arrow images sit on top of each other and crossfade */
  .q-next-box img {
    display: block;
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: opacity 0.45s ease; /* ← crossfade speed */
  }

  /* Default arrow: visible by default, fades out when activated */
  .q-arrow-default { opacity: 1; }
  .q-arrow-active  { opacity: 0; }

  /* Activated state: swap which image is visible */
  .q-next-box.activated .q-arrow-default { opacity: 0; }
  .q-next-box.activated .q-arrow-active  { opacity: 1; }

  .q-next-box:disabled { cursor: default; }
  .q-next-box--hidden { visibility: hidden; pointer-events: none; }

  /* Restart button — same size/position as next arrow, smooth hover crossfade */
  .q-restart-default { opacity: 1; }
  .q-restart-hover   { opacity: 0; }
  .q-next-box.q-restart-btn:hover .q-restart-default { opacity: 0; }
  .q-next-box.q-restart-btn:hover .q-restart-hover   { opacity: 1; }
.q-next-box.q-restart-btn {
  left: calc(45% - var(--arrow-size) + 4vw);
  transform: translateY(-50%) scaleX(-1);
}

  /* Top-right corner bracket — ┐ shape (replaces old arrow area) */
  .q-corner-tr {
    position: absolute;
    right: 5.4vw;
    top: 0;
    width: 45px;
    height: 45px;
    border-top: 1px solid #111;
    border-right: 1px solid #111;
  }

  /* ── TOP T-INDICATOR ─────────────────────────────────────── */

  /* Inverted-T (┬) — top edge aligns with the number box.
     Crossbar at top, stem pointing downward. */
  .q-top-tcap {
    position: absolute;
    top: 0;             /* ← aligns with the top of the number/arrow boxes */
    left: 45%;          /* ← horizontal position = column split (match bottom T) */
    transform: translateX(-50%);
  }

  /* ── CONTENT AREA ────────────────────────────────────────── */

  /* Flex row: left column (question) + right column (image) */
  .q-content {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* Left column — spans from the left edge to the T-cap (0 → 45%) */
  .q-col-left {
    width: 45%;          /* must match T-cap's "left: 45%" — do not change */
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    overflow: hidden;

    /* ── SEARCHBAR / QUESTION TEXT PLACEMENT ───────────────────
       These two values move the entire text+searchbar group.
       Change ONLY these to reposition: */
    padding-top:  15vh;  /* ← UP / DOWN  — increase to push down, decrease to push up  */
    padding-left: 14vw;  /* ← LEFT / RIGHT — increase to push right, decrease to push left */

    /* ── SEARCHBAR WIDTH ────────────────────────────────────────
       Width = 45vw − padding-left − padding-right.
       Keep padding-right so left+right ≈ 23vw (original size). */
    padding-right:  9vw; /* ← decrease to widen searchbar, increase to narrow it */
    padding-bottom: 2vh;
  }

  .q-vsep { display: none; }

  /* Right column — holds the shield illustration */
  .q-col-right {
    flex: 1;
    display: flex;
    align-items: center;     /* ← SHIELD VERTICAL POSITION — "flex-start" = top, "flex-end" = bottom */
    justify-content: center; /* ← SHIELD HORIZONTAL POSITION — "flex-start" = left, "flex-end" = right */
    padding: 3vh 5vw;        /* ← SHIELD BREATHING ROOM — top/bottom (3vh) and left/right (5vw) margin */
  }

  /* ── QUESTION TEXT ───────────────────────────────────────── */

  /* Main question heading — e.g. "VILKEN KOMMUN BOR DU I?" */
  .q-h2 {
    font-family: "Helvetica Neue LT Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: clamp(16px, 1.8vw, 32px); /* ← QUESTION TEXT SIZE  — change the middle value (1.8vw) */
    font-weight: 500;
    text-transform: uppercase;
    line-height: 1.2;
    margin-bottom: 2vh;  /* ← GAP BETWEEN TITLE AND SEARCHBAR */
    color: #111;
  }

  /* Q3 hover label under the question title */
  .q-h2-hover {
    font-family: "Helvetica Neue LT Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: clamp(14px, 1.4vw, 22px);
    font-weight: 500;
    line-height: 1.2;
    color: #111;
    margin-top: 1.6vh;
    margin-bottom: 2vh;
    min-height: 1.2em; /* keep layout stable even when empty */
    opacity: 0;
    transition: opacity 0.18s ease;
  }

  .q-h2-hover.is-visible {
    opacity: 1;
  }

  .q-boende-label-wrap {
    position: relative;
    min-height: 1.2em;
    margin-top: 1.6vh;
    margin-bottom: 2vh;
  }

  .q-boende-label-wrap .q-boende-label {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .q-boende-label-wrap .q-boende-label.is-visible {
    opacity: 1;
  }

  /* Shared sticky-label pattern for Q3 and Q5 */
  .q-sticky-label-wrap {
    position: relative;
    min-height: 1.2em;
    margin-top: 1.6vh;
    margin-bottom: 2vh;
  }
  .q-sticky-label-wrap .q-sticky-label {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .q-sticky-label-wrap .q-sticky-label.is-visible {
    opacity: 1;
  }

  /* ── SEARCH BOX ──────────────────────────────────────────── */

  /* Text input for searching/filtering the municipality list */
  .q-search-inp {
    width: 100%;
    border: 1px solid #111;  /* full border — dropdown overlaps bottom by 1px */
    padding: 0.9vh 0.7vw; /* ← SEARCHBAR HEIGHT — increase the first value (0.6vh) to make it taller */
    font-family: 'Space Mono', monospace;
    font-size: clamp(9px, 0.75vw, 12px); /* ← SEARCHBAR FONT SIZE — change the middle value (0.75vw) */
    color: #333;
    outline: none;
    flex-shrink: 0;
    cursor: text;
    user-select: text;
  }

  .q-search-inp::placeholder { color: #aaa; }

  /* ── MUNICIPALITY SUGGESTIONS DROPDOWN ──────────────────── */

  /* Wrapper so the dropdown can be positioned relative to the input */
  .q-search-wrap {
    position: relative;
    flex-shrink: 0;
    width: 100%;        /* fills the column so it stays aligned with the heading above */
  }

  /* Dropdown that appears below the input while typing */
  .q-list {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    margin-top: -1px;        /* overlap input's bottom border — no double line */
    border: 1px solid #111;
    border-top: none;
    background: #fff;
    overflow-y: auto;
    max-height: calc(5 * 3.2vh); /* ← number of visible suggestion rows */
    z-index: 10;
  }

  .q-list::-webkit-scrollbar { width: 3px; }
  .q-list::-webkit-scrollbar-thumb { background: #ccc; }

  /* Single suggestion row */
  .q-list-item {
    display: flex;
    align-items: center;
    padding: 0.55vh 0.7vw;
    font-family: 'Space Mono', monospace;
    font-size: clamp(9px, 0.75vw, 12px); /* ← suggestion font size */
    cursor: pointer;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    height: 3.2vh;
  }

  .q-list-item:hover { background: #f5f5f5; }

  /* Selected municipality row */
  .q-list-item.sel { background: #efefef; font-weight: 700; }

  /* "No results" message */
  .q-no-result {
    padding: 1.5vh 0.8vw;
    font-family: 'Space Mono', monospace;
    font-size: clamp(10px, 0.85vw, 13px);
    color: #aaa;
  }

  /* ── RIGHT COLUMN IMAGE ──────────────────────────────────── */

  /* The shield / illustration shown in the right half */
  .q-shield-img {
    max-height: 70vh;  /* ← SHIELD HEIGHT — increase to make it bigger, decrease to shrink */
    max-width: 90%;    /* ← SHIELD WIDTH CAP — relative to the right column width */
    object-fit: contain;
  }

  /* ── RIGHT COLUMN: OPTIONS / SELECTION (Q2–Q5) ─────────────── */

  .q-col-right-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2vh;
    width: 100%;
  }

  .q-col-right .q-options {
    display: flex;
    flex-direction: column;
    gap: 1.2vh;
    width: 100%;
    max-width: 85%;
  }

  /* ── Q3: SVG ICON GRID (2x2, hover animation) ───────────────────────────── */

  .q-hälsa-grid {
    display: grid;
    grid-template-columns: max-content max-content;
    justify-content: center;
    row-gap: 0.1vh;
    column-gap: 10px;
    width: 100%;
    max-width: 100%;
  }

  .q-hälsa-opt {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1vh;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font-family: "Helvetica Neue LT Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
    transition: transform 0.12s ease;
  }

  .q-hälsa-opt:active {
    transform: scale(0.97);
  }

  .q-hälsa-svg-wrap {
    position: relative;
    width: 260px; /* explicit size so max-content columns don't collapse */
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .q-hälsa-svg-wrap img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    transition: opacity 0.35s ease;
  }

  .q-hälsa-svg-default { opacity: 1; }
  .q-hälsa-svg-hover   { opacity: 0; }

  .q-hälsa-opt:hover .q-hälsa-svg-default { opacity: 0; }
  .q-hälsa-opt:hover .q-hälsa-svg-hover   { opacity: 1; }

  .q-hälsa-opt.selected .q-hälsa-svg-default { opacity: 0; }
  .q-hälsa-opt.selected .q-hälsa-svg-hover   { opacity: 1; }

  /* No label under icons (label shows under question text instead) */

  /* ── Q5: SVG ICON ROW (3 side-by-side, same behavior as Q3) ─────────────── */

  .q-kunskap-row {
    display: grid;
    grid-template-columns: max-content max-content max-content;
    justify-content: center;
    column-gap: 10px;
    width: 100%;
  }

  .q-kunskap-opt {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    transition: transform 0.12s ease;
  }

  .q-kunskap-opt:active {
    transform: scale(0.97);
  }

  .q-kunskap-svg-wrap {
    position: relative;
    width: 220px;
    aspect-ratio: 1;
  }

  .q-kunskap-svg-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    transition: opacity 0.35s ease;
  }

  .q-kunskap-svg-default { opacity: 1; }
  .q-kunskap-svg-hover   { opacity: 0; }

  .q-kunskap-opt:hover .q-kunskap-svg-default { opacity: 0; }
  .q-kunskap-opt:hover .q-kunskap-svg-hover   { opacity: 1; }

  .q-kunskap-opt.selected .q-kunskap-svg-default { opacity: 0; }
  .q-kunskap-opt.selected .q-kunskap-svg-hover   { opacity: 1; }

  /* ── Q2: HOUSING (2 icons + year followup) ─────────────────────────────── */

  .q-boende-row {
    display: grid;
    grid-template-columns: max-content max-content;
    justify-content: center;
    column-gap: 10px;
    width: 100%;
  }

  .q-boende-opt {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    transition: transform 0.12s ease;
  }

  .q-boende-opt:active {
    transform: scale(0.97);
  }

  .q-boende-svg-wrap {
    position: relative;
    width: 260px;
    aspect-ratio: 1;
  }

  .q-boende-svg-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    transition: opacity 0.35s ease;
  }

  .q-boende-svg-default { opacity: 1; }
  .q-boende-svg-hover   { opacity: 0; }

  .q-boende-opt:hover .q-boende-svg-default { opacity: 0; }
  .q-boende-opt:hover .q-boende-svg-hover   { opacity: 1; }

  .q-boende-opt.selected .q-boende-svg-default { opacity: 0; }
  .q-boende-opt.selected .q-boende-svg-hover   { opacity: 1; }

  .q-col-right .q-opt {
    display: flex;
    align-items: center;
    gap: 1vw;
    padding: 1.8vh 1.2vw;
    background: #fff;
    border: 1px solid #111;
    cursor: pointer;
    text-align: left;
    font-family: "Helvetica Neue LT Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: clamp(12px, 1.2vw, 18px);
    font-weight: 500;
    color: #111;
  }

  .q-col-right .q-opt:hover { background: #f5f5f5; }

  .q-col-right .q-opt.selected {
    border-color: #111;
    background: #eee;
  }

  .q-opt .q-opt-radio {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .q-opt .q-opt-radio svg {
    width: 12px;
    height: 12px;
    display: block;
  }

  .q-opt .q-opt-label { flex: 1; }

  .q-opt .q-opt-radio .q-tri-outline {
    fill: none;
    stroke: #111;
    stroke-width: 1.5;
    stroke-linejoin: miter;
    stroke-linecap: butt;
  }

  .q-opt .q-opt-radio .q-tri-fill {
    fill: #111;
    transition: fill 0.25s ease, opacity 0.25s ease;
  }

  .q-opt .q-opt-radio .q-tri-fill {
    opacity: 0;
  }

  .q-opt.selected .q-opt-radio .q-tri-fill {
    opacity: 1;
  }

  .q-col-right .q-opt,
  .q-col-left .q-opt,
  .q-opts-grid--left .q-opt {
    transition: background 0.25s ease, border-color 0.25s ease;
  }

  .q-col-right .q-opts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1vh;
  }

  .q-col-right .q-sub-label {
    font-family: 'Space Mono', monospace;
    font-size: clamp(10px, 0.9vw, 14px);
    color: #555;
    align-self: flex-start;
  }

  .q-sub-label--helvetica {
    font-family: "Helvetica Neue LT Pro", "Helvetica Neue", Helvetica, Arial, sans-serif !important;
    font-size: clamp(14px, 1.4vw, 22px) !important;
    font-weight: 500;
    color: #111;
  }

  .q-boende-byggår {
    margin-top: 2vh;
    max-width: 100%;
  }

  .q-col-left .q-opt,
  .q-opts-grid--left .q-opt {
    display: flex;
    align-items: center;
    gap: 1vw;
    padding: 1.4vh 1.2vw;
    background: #fff;
    border: 1px solid #111;
    cursor: pointer;
    text-align: left;
    font-family: "Helvetica Neue LT Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: clamp(12px, 1.2vw, 18px);
    font-weight: 500;
    color: #111;
  }

  .q-age-illu-wrap .q-age-illu {

function calcScore() {
  const k = KOMMUNER.find(x => x.n === S.kommun);
  const kommunScore = k ? Math.min(k.c, 100) : 0;
  let boendeScore = 50;
  if      (S.boende==='lagenhet'&&S.byggår==='fore1960')   boendeScore=100;
  else if (S.boende==='lagenhet'&&S.byggår==='19602002')   boendeScore=88;
  else if (S.boende==='lagenhet'&&S.byggår==='efter2002')  boendeScore=28;
  else if (S.boende==='lagenhet'&&S.byggår==='vetej')      boendeScore=55;
  else if (S.boende==='hus'&&S.byggår==='fore1960')        boendeScore=22;
  else if (S.boende==='hus'&&S.byggår==='19602002')        boendeScore=18;
  else if (S.boende==='hus'&&S.byggår==='efter2002')       boendeScore=5;
  else if (S.boende==='hus'&&S.byggår==='vetej')           boendeScore=14;
  const hm={ingen:100,lätt:65,tydlig:32,stor:8};
  const hälsaScore=hm[S.hälsa]||50;
  const a=S.ålder;
  const åldersScore=a<10?28:a<15?52:a<=50?100:a<=60?85:a<=70?65:a<=80?42:20;
  const km={ja:100,ungefär:50,nej:8};
  const kunskapScore=km[S.kunskap]||50;
  const total=Math.round(kommunScore*0.30+boendeScore*0.20+hälsaScore*0.20+åldersScore*0.15+kunskapScore*0.15);
  return {total,kommunScore,boendeScore,hälsaScore,åldersScore,kunskapScore};
}

function dots(cur){
  let h='<div class="steps">';
  for(let i=0;i<5;i++){
    const c=i<cur?'done':i===cur?'active':'';
    h+=`<div class="step-dot ${c}"></div>`;
    if(i<4) h+=`<div class="step-line ${i<cur?'done':''}"></div>`;
  }
  h+=`<span class="step-label">${cur<5?(cur+1)+' / 5':'✓'}</span></div>`;
  return h;
}

  btns.forEach(b=>{
    b.classList.toggle('selected', b.dataset.boende===val);

let prevStep = -1;
let runnerStep = -1;    // step the runner has fully arrived at
let runnerOrigCX = 0;   // runner's centre-X when transform is none (set fresh each render)
const DOT_PCT = [20, 40, 60, 80];

function qProgBarHtml(){
  const dotElems=[0,1,2,3].map(i=>{
    // Dots behind the runner are already exploded
    const already = i < (runnerStep - 1);
    // The dot the runner is currently resting on is transparent
    const atRunner = !already && (runnerStep >= 1 && runnerStep <= 4) && i === (runnerStep - 1);
    const cls = already ? ' exploded exploded--instant' : (atRunner ? ' dot--at-runner' : '');
    return `<div class="q-prog-dot${cls}" data-dot="${i}" style="left:${DOT_PCT[i]}%"><img class="q-dot-expl-img" src="nya pikto/new piktogram_Explosion.svg" alt=""></div>`;
  }).join('');
  return `<div class="q-runner-wrap" id="qRunnerWrap">
      <img class="q-runner-img" src="nya pikto/new piktogram_Springer.svg" alt="">
    </div>
    <div class="q-prog-track" id="qProgTrack">${dotElems}</div>
    <img class="q-home-img" src="nya pikto/piktorgrawwadmam.svg" alt="Hem" onclick="restart()">`;
}

// Returns the absolute translateX needed to place the runner at dot for 'step'.
// Always measured from runnerOrigCX (the un-transformed centre), so it's correct
// regardless of whatever transform is currently applied to the element.
function computeShift(step){
  const track = document.getElementById('qProgTrack');
  if(!track || step <= 0) return 0;
  const tr = track.getBoundingClientRect();
  // step 5 = result page: runner reaches the far end of the track
  const pct = step >= 5 ? 100 : DOT_PCT[Math.min(step, 4) - 1];
  const dotX = tr.left + tr.width * pct / 100;
  return dotX - runnerOrigCX;
}

function animateProgress(from, to){
  const rw = document.getElementById('qRunnerWrap');
  if(!rw) return;

  const fromShift = computeShift(from);
  const toShift   = computeShift(to);

  // If positions are identical there is nothing to animate.
  if(fromShift === toShift){ runnerStep = to; return; }

  // The dot being left (runner was resting on it — currently transparent).
  // Fade it back in, then after a short delay explode it.
  const leavingDotIdx = from - 1;
  if(leavingDotIdx >= 0 && leavingDotIdx <= 3){
    const leavingDot = document.querySelector(`.q-prog-dot[data-dot="${leavingDotIdx}"]`);
    if(leavingDot){
      leavingDot.classList.remove('dot--at-runner'); // fades back in
      setTimeout(()=>{
        leavingDot.classList.remove('exploded--instant');
        leavingDot.classList.add('exploded');
      }, 200);
    }
  }

  // 1. Snap runner to its 'from' position without a transition.
  rw.style.transition = 'none';
  rw.style.transform  = `translateX(${fromShift}px)`;
  void rw.getBoundingClientRect(); // commit — this is now the CSS "from" value

  // 2. Enable transition and set the target — browser animates between the two.
  rw.style.transition = 'transform 0.55s cubic-bezier(0.4,0,0.2,1)';
  rw.style.transform  = `translateX(${toShift}px)`;

  rw.addEventListener('transitionend', ()=>{
    runnerStep = to;
    // Hide the dot the runner just arrived on
    const arrivedDotIdx = to - 1;
    if(arrivedDotIdx >= 0 && arrivedDotIdx <= 3){
      const arrivedDot = document.querySelector(`.q-prog-dot[data-dot="${arrivedDotIdx}"]`);
      if(arrivedDot){ arrivedDot.classList.add('dot--at-runner'); }
    }
  }, {once:true});
}

          <img class="q-restart-hover"   src="nya pikto/new piktogram_Pil restart hover.svg"   alt="">

      : `<button class="q-next-box${canProceed?' activated':''}" ${canProceed?`onclick="go(${nextStep})"`:'disabled'}>

}

    <div id="q-kunskap-label-wrap" class="q-h2-hover q-sticky-label-wrap is-visible" aria-live="polite">
      <span class="q-sticky-label${S.kunskap==='ja'?' is-visible':''}" data-val="ja">Ja</span>
      <span class="q-sticky-label${S.kunskap==='ungefär'?' is-visible':''}" data-val="ungefär">Ungefär</span>

function stepResult(){
  const {total,kommunScore,boendeScore,hälsaScore,åldersScore,kunskapScore}=calcScore();
  const lv=getLevel(total);
  const tips=getTips(lv.label);
  const bars=[
    {l:'Kommun',v:kommunScore},
    {l:'Boende',v:boendeScore},
    {l:'Hälsa',v:hälsaScore},
    {l:'Ålder',v:åldersScore},
    {l:'Kunskap',v:kunskapScore}
  ];
  const left=`<div class="q-result-inner">
    <h2 class="q-h2">RESULTAT</h2>
    <div class="q-result-score">${total}<span>/100</span></div>
    <div class="q-result-level">${lv.label}</div>
    <div class="q-result-desc">${lv.desc}</div>
    <div class="q-result-section">
      <div class="q-result-section-label">Faktoranalys</div>
      ${bars.map(b=>`<div class="q-result-bar-row">
        <div class="q-result-bar-name">${b.l}</div>
        <div class="q-result-bar-track"><div class="q-result-bar-fill" style="width:${b.v}%"></div></div>
        <div class="q-result-bar-val">${b.v}</div>
      </div>`).join('')}
    </div>
  </div>`;
  const right=`<div class="q-result-right">
    <img class="q-result-svg" src="nya pikto/${lv.svg}" alt="${lv.label}">
    <div class="q-result-rekom">
      <div class="q-result-rekom-label">Rekommendationer</div>
      <ul class="q-result-tips-list">${tips.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>
  </div>`;
  return qPageShell(5,left,right,false,5,true);
}

function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function ageKindFromValue(v){
  if(v>=0 && v<=6) return 'bebis';
  if(v>=7 && v<=18) return 'barn';
  if(v>=19 && v<=65) return 'vuxen';
  return 'gammal';
}

function ageSvgForKind(kind){
  switch(kind){
    case 'bebis': return 'new piktogram_4. Ålder- Bebis.svg';
    case 'barn': return 'new piktogram_4. Ålder- Barn.svg';
    case 'vuxen': return 'new piktogram_4. Ålder- Vuxen.svg';
    case 'gammal': return 'new piktogram_4. Ålder- Gammal.svg';
    default: return 'new piktogram_4. Ålder- Default.svg';
  }
}

function preloadAgeSvgs(){
  const base = 'nya pikto/';
  const files = [
    'new piktogram_4. Ålder- Default.svg',
    'new piktogram_4. Ålder- Bebis.svg',
    'new piktogram_4. Ålder- Barn.svg',
    'new piktogram_4. Ålder- Vuxen.svg',
    'new piktogram_4. Ålder- Gammal.svg'
  ];
  for(const f of files){
    const img = new Image();
    img.src = base + f;
  }
}

function syncAgeUI(){
  const num=document.getElementById('ad');
  if(num) num.innerHTML = S.ålder + ' <span>år</span>';

  const kind = S.ageTouched ? ageKindFromValue(S.ålder) : 'default';
  if(kind === S.ageKind) return;

  const wrap=document.getElementById('ageWrap');
  if(!wrap) return;

  const nextLayer=wrap.querySelector('.q-age-illu--'+kind);
  const nextImg=nextLayer?nextLayer.querySelector('img'):null;
  const doSwitch=()=>{ S.ageKind=kind; wrap.dataset.kind=kind; };
  if(nextImg && nextImg.decode){
    nextImg.decode().then(doSwitch).catch(doSwitch);
  }else{
    doSwitch();
  }
}

function handleSearch(val){
  S.search=val;
  S.kommun=null;
  render();
  // restore cursor at end
  requestAnimationFrame(()=>{
    const el=document.getElementById('ks');
    if(el){el.focus();const l=el.value.length;el.setSelectionRange(l,l);}
  });
}

function pickKommun(name){
  S.kommun=name;
  S.search=name;
  // Targeted DOM update so the CSS opacity transition can play
  const list=document.querySelector('.q-list');
  if(list) list.remove();
  const input=document.getElementById('ks');
  if(input) input.value=name;
  const btn=document.querySelector('.q-next-box');
  if(btn){
    btn.disabled=false;
    btn.onclick=function(){go(1);};
    btn.classList.add('activated');
  }
}

function go(n){
  const from=S.step;
  prevStep=from;
  S.step=n;
  history.pushState({step:n, runnerStep:runnerStep, prevStep:from}, '');
  render();
  window.scrollTo({top:0,behavior:'smooth'});
  requestAnimationFrame(()=>animateProgress(from,n));
}

function goToStatisticsHome(){
  window.location.href = '/';
}

function restart(){
  prevStep=-1;
  runnerStep=-1;
  S={step:-1,search:'',kommun:null,boende:null,byggår:null,hälsa:null,ålder:35,ageTouched:false,ageKind:'default',kunskap:null};
  history.pushState({step:-1, runnerStep:-1, prevStep:-1}, '');
  render();window.scrollTo({top:0,behavior:'smooth'});
}

window.addEventListener('popstate', function(e){
  const st = e.state;
  if(!st) return;
  // Restore step and runner state, then re-render without animation
  prevStep   = st.prevStep   ?? -1;
  runnerStep = st.runnerStep ?? -1;
  S.step     = st.step       ?? -1;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
});

function render(){
  const views = {
    [-1]: introView,
     0: step0,
     1: step1,
     2: step2,
     3: step3,
     4: step4,
     5: stepResult
  };
  document.getElementById('root').innerHTML = (views[S.step] || introView)();
  const headerEl = document.querySelector('.header');
  if(headerEl) headerEl.style.display = S.step <= -1 ? 'none' : 'flex';
  if(S.step === 3) requestAnimationFrame(syncAgeUI);
  // Capture the runner's un-transformed centre-X (transform is 'none' at this point
  // because it was just created by innerHTML).  Then restore to its resting position.
  const rw = document.getElementById('qRunnerWrap');
  if(rw){
    const r = rw.getBoundingClientRect();
    runnerOrigCX = r.left + r.width / 2;   // genuine origin, no transform applied yet
    if(runnerStep >= 0){
      rw.style.transition = 'none';
      rw.style.transform  = `translateX(${computeShift(runnerStep)}px)`;
      void rw.getBoundingClientRect();
    }
  }
}

// Seed history so the first back-press returns to intro instead of leaving the page
history.replaceState({step:-1, runnerStep:-1, prevStep:-1}, '');
render();
preloadAgeSvgs();
</script>
